version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mapo_postgres
    environment:
      POSTGRES_DB: wfm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mapo_backend
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wfm_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3000
      JWT_SECRET: mapo-secret-key-for-dev-only
      CORS_ORIGIN: http://localhost:4200
      SOCKET_CORS_ORIGIN: http://localhost:4200
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./wfm-frontend
      dockerfile: Dockerfile.dev
    container_name: mapo_frontend
    ports:
      - "4200:4200"
    volumes:
      - ./wfm-frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
