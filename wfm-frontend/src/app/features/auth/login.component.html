<div class="login">
  <div class="card">
    <p class="eyebrow">WFM MAPO</p>
    <h2>Acceso seguro</h2>
    <p class="hint">Autenticación segura con JWT.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <label>
        Usuario
        <input type="text" placeholder="admin" formControlName="username" />
      </label>

      <label>
        Contraseña
        <input type="password" placeholder="••••••" formControlName="password" />
      </label>

      <button type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
      
      <p class="sub-hint mt">Credenciales por defecto: admin / admin123</p>
    </form>
  </div>
</div>
